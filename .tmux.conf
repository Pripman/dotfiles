# Reload the config on the fly 
unbind r
bind r source-file ~/.tmux.conf 

# set leader
set-option -g prefix C-Space

# Toggle pane by pressing leader +  * a
bind-key C-s swap-pane

# Fuzzy find and open folder in new session
bind-key M-f command-prompt -p "Open folder in session" "run-shell 'find ~/repos -type d | fzf | xargs -I{} sh -c \'tmux new -Ads {} -c {} && tmux switch -t {}\'"

setw -g mouse on



set -g status-position top

# List of plugins
set -g @plugin 'rose-pine/tmux'

set -g @rose_pine_variant 'main' 
set -g @rose_pine_directory 'on' # Turn on the current folder component in the status bar


# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Shift enter in claude code should make new line instead of sending the command
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'
